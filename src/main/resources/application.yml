server:
  port: 8081 # 指定端口号
spring:
  datasource:
    # url: jdbc:mysql://localhost:3306/smartpai?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    # url: jdbc:mysql://localhost:3306/paismart?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    url: jdbc:mysql://127.0.0.1:3306/paismart?serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&cachePrepStmts=true&characterEncoding=utf8
    username: root
    password: PaiSmart2025  # 已对齐Docker MySQL密码，无需改
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  data:
    redis:
      host: localhost
      port: 6379
      password: PaiSmart2025  # 已对齐Docker Redis密码，无需改
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB # 单个文件的最大大小
      max-request-size: 100MB # 整个请求的最大大小
  kafka:
    enabled: true  # 启用 Kafka
    bootstrap-servers: 127.0.0.1:9092 # Kafka 服务器地址（正确，无需改）
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      transactional-id-prefix: file-upload-tx-
      properties:
        client.dns.lookup: use_all_dns_ips
    consumer:
      group-id: file-processing-group # 消费者组 ID（正确，无需改）
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*" # 允许反序列化的包
        client.dns.lookup: use_all_dns_ips
    topic:
      file-processing: file-processing # 已对齐Docker Kafka主题，无需改
      dlt: file-processing-dlt # 死信队列主题（保留）
  webflux:
    client:
      max-in-memory-size: 16MB  # 增加响应大小限制（保留）
  codec:
    max-in-memory-size: 16MB    # 增加编解码大小限制（保留）

minio:
  endpoint: http://localhost:19000 # 已对齐Docker MinIO端口，无需改
  accessKey: admin # 已对齐Docker MinIO账号，无需改
  secretKey: PaiSmart2025 # 已对齐Docker MinIO密码，无需改
  bucketName: uploads # 可保留，后续在MinIO控制台创建uploads桶即可
  publicUrl: http://localhost:19000 # 已对齐端口，无需改

jwt:
  secret-key: "PXrQbuCwXwOZzkML/Vm2S5rSwt1iybvmKtGDzVEu+Hc=" # 保留

# 管理员账号初始化配置
admin:
  username: admin
  password: admin123
  primary-org: default
  org-tags: default,admin # 保留

file:
  parsing:
    chunk-size: 512 # 每个文本块的最大字符数
    buffer-size: 8192    # 8KB 缓冲区
    max-memory-threshold: 0.8  # 80% 内存阈值（保留）

elasticsearch:
  host: localhost       # 正确，无需改
  port: 9200            # 正确，无需改
  scheme: http          # 已关闭HTTPS，无需改
  username: elastic     # 正确，无需改
  password: PaiSmart2025 # 已对齐Docker ES密码，无需改

logging:
